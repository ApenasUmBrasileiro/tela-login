<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGIN PAGE</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class ="quadro">
        <h1  class="texto-Login">LOGIN</h1>
        <label for="username" class="texto-label">Usuário</label>
        <input class="input-login" type="text" id = "username"/>
        <label for="password" class="texto-label">Senha</label>
        <input class="input-login" type="password" id ="password">

        <div class="actions">
            <button id="logar" class="botao-login">
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
                ENTRAR</button>
        </div>
    </div>
    <script src="login.js"></script>
</body>
</html>
